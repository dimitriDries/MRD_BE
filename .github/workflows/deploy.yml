name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# Pages source must be set to "GitHub Actions" (Settings > Pages) for this to run.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # Installs deps, runs `astro build`, and uploads ./dist as the Pages artifact.
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
